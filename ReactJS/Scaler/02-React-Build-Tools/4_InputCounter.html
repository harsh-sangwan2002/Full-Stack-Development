<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- algorithm to efficiently manipulate your UI -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- React DOM  -> uses react to update the DOM-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- transpiler -> JSX -> into javascript -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <title>Input Counter</title>
</head>

<body>
    <div id="root"></div>
</body>

<script type="text/babel">

    function InputCounter() {

        let userInputValue = 0;
        const [count,setCount] = React.useState(0);

        const handleInput = (event)=>{
            userInputValue = parseInt(event.target.value);
        }

        const handleSetInput = ()=>{
            setCount(userInputValue);
        }

        const increment = ()=>{
            setCount(count+1);
        }

        const decrement = ()=>{
            setCount(count-1);
        }

        return <div>
            <div class="counter">
                <input type="number" id="number" onChange={handleInput} />
                <button onClick={handleSetInput}>Set</button>
            </div>
            <div class="counter">
                <button onClick={increment}>+</button>
                <p>{count}</p>
                <button onClick={decrement}>-</button>
            </div>
        </div>
    }

    ReactDOM.render(<InputCounter />, document.getElementById('root'));
</script>

</html>
