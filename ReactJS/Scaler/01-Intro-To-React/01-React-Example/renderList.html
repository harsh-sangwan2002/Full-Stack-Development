<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- algorithm to efficiently manipulate your UI -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- React DOM  -> uses react to update the DOM-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- transpiler -> JSX -> into javascript -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <title>App</title>
</head>

<body>
    <!-- Whole applicaton lives here -->
    <div id="root"></div>
</body>

<script type="text/babel">

    const stationary = ["Pen", "Pencil", "Eraser", "Ruler"];

    function List() {
        return (<div>
            <h1>List Item</h1>
            <ul>
                {
                    stationary.map(item => (
                        <li key={item}>{item}</li>
                    ))
                }
            </ul>
        </div>)
    }

    ReactDOM.render(<List />, document.getElementById('root'));

</script>

<!-- usecase of React Ecosystem
1. React -> algorithm -> how to effciently manipulate your UI
2. React DOM -> acually update the DOM 
3. Babel -> it is a transpiler(translator) converts one version, JSX-> JS, Typesecript -> JS
4. Webpack,parcel,rollup -> module bundler
    * modularize the code
    * code splitting 
    * building an optimized output from all the input code 
5. JSX -> syntax sugar to write html and js together, inspired from template strings
6. Components :Components are independent and reusable bits of code.
They serve the same purpose as JavaScript functions, and finally return html code 
7. props: it is used to configure the children component by passing different properties , it is similare to html attributes,
that's why it is used to send data from parent children 
8. list -> you just need map to give an array of html element
9. Keys -> are used internally to identify list elements uniquley 
10. React.Fragment -> used to wrap multiple elements/components without adding any extra elements
-->
<!--
    1. if there are lot of dynamic content -> lot of ui changes ->
     then only react makes sense otherwise it overcomplicates the things (vanilla stack is better)
    2. React -> client side rendered -> SEO is bad by default 
    4. React -> a normal library and not a complete solution (Next) (angular is better)
-->
    
</html>
