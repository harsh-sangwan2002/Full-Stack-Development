<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- algorithm to efficiently manipulate your UI -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- React DOM  -> uses react to update the DOM-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- transpiler -> JSX -> into javascript -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <title>Multiple Components</title>
</head>

<body>
    <!-- Whole applicaton lives here -->
    <div id="root"></div>
</body>

<script type="text/babel">

    function HelloParent() {
        return (<>
            <Hello age="21" occupation="Software Engineer" />
            <Hello age="22" occupation="Tech Lead" />
            <Hello age="23" occupation="SDE2" />
        </>)
    }

    // props -> Attribute which are passed as inside your react component.
    function Hello(props) {
        let { age, occupation } = props;
        return <h1>Hello! My name is Harsh and I am {age} years old. I work as a {occupation}.</h1>
    }

    ReactDOM.render(<HelloParent />, document.getElementById('root'));
</script>

<!-- 
because -> reactdom render only one component -> so you have to compose multiple component into a parent component
because that componnet will only be rendered

1. component: Components are independent and reusable bits of code.
They serve the same purpose as JavaScript functions,
but work in isolation and return HTML
2. Prop : properties passed to a component helps to configure that differenlty
3. JSX -> Javascript and XML(combines syntax of HTML and JS)
4. you create bigger components using smaller component -> component
5. All the components starts with Uppercase 
-->

</html>
