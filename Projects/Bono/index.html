<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">

    <title>Bono App | Sign Up</title>
</head>

<body>

    <div class="wrapper">

        <header class="header">
            <a href="index.html"><img class="logo" src="images/logo.svg" alt="Bono"></a>
            <div class="header-right">
                <div><i class="fas fa-envelope"></i>contact@bono.com</div>
                <div><i class="fas fa-phone"></i>(+31) 021-800-8244</div>
                <a href="https://www.twitter.com" target="_blank"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </header>

        <main class="main-content">
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message"></textarea>
                </div>
                <button type="submit" class="btn">Submit</button>
            </form>

            <section class="text-container">
                <h1>Coming Soon For Every Developer</h1>
                <p>Out new Bono app will change the way you think about
                    content management and will allow you to focus on what's really
                    important.
                    Use the contact form to send us your thoughts.
                </p>
            </section>
        </main>

    </div>

</body>

</html>
