<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- algorithm to efficiently manipulate your UI -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- React DOM  -> uses react to update the DOM-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- transpiler -> JSX -> into javascript -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <title>App</title>
</head>

<body>
    <!-- Whole applicaton lives here -->
    <div id="root"></div>
</body>

<script type="text/babel">

    function Hello(props) {
        let { age, occupation } = props;
        return <h1>Hello! My name is Harsh and I am {age} years old. I work as a {occupation}.</h1>
    }

    ReactDOM.render(<Hello age="21" occupation="Software Engineer"/>, document.getElementById('root'));

</script>

</html>
