<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>I am a list</h1>
    <ul>

    </ul>
</body>

<script>

    // Your task is to create a coffee

    // 1. Create element
    const li = document.createElement('li');

    // 2. Add attribute + content
    li.innerText = "Make Coffee";

    // 3. Select existing parent
    const list = document.querySelector('ul');

    // 4. Add element to the tree
    list.appendChild(li);
    
</script>

</html>
