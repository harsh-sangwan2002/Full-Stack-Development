<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <button>click Me </button>
    <input type="text">
    <ul></ul>

</body>

<script>

    /****************************
     * Q-1 What do you understand by event-listeners?
     * Ans- Event listener are the procedures that wait for a particular event to occur like a mouse-click, keyboard press, etc.
     * When the event occurs this procedure follow the step of instructions.
     *  ****************************/

    const button = document.querySelector("button");
    
    console.log("Before");
    
    button.addEventListener('click',function(e){
        
        const input = document.querySelector("input");
        const value = input.value;

        const ul = document.querySelector("ul");
        const li = document.createElement('li');
        li.innerText = value;
        ul.appendChild(li);

        input.value = "";
        input.focus();
    })

    console.log("After");

</script>

</html>
