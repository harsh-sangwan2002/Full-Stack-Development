<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>List Item</h1>
    <ul id="listContainer"></ul>

</body>

<script>

    let ul = document.querySelector('#listContainer');
    let N = 100000;

    // TC : O(N^2)
    // for (let i = 0; i <= N; i++) {

    //     // Creation
    //     let newLi = document.createElement('li');

    //     // Update
    //     newLi.textContent = `Item ${i}`;

    //     // Append
    //     ul.appendChild(newLi); // TC: O(N)
    // }


    // Shorter way to solve the problem
    // Add sub-component / fragment
    let fragment = document.createDocumentFragment();
    for (let i = 0; i < N; i++) {

        // Creation
        let newLi = document.createElement('li');

        // Update
        newLi.textContent = `Item ${i}`;

        // Append
        fragment.appendChild(newLi); // TC: O(1) - adding in local memory
    }

    // TC : O(N)
    ul.appendChild(fragment);

</script>

</html>
